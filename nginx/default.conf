# nginx config that runs *inside* the container, serving the static build.
# The host nginx terminates TLS and proxies to this on 127.0.0.1:8080.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # Vite emits content-hashed files under /assets — cache them forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page app fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
