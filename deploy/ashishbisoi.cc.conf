# HOST nginx site config for ashishbisoi.cc
# Place at: /etc/nginx/sites-available/ashishbisoi.cc
# then symlink into sites-enabled (see DEPLOY.md).
#
# This terminates TLS using your certbot certificates and reverse-proxies
# to the Docker container listening on 127.0.0.1:8080.

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ashishbisoi.cc www.ashishbisoi.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ashishbisoi.cc www.ashishbisoi.cc;

    # --- Certbot-managed certificates ---
    ssl_certificate     /etc/letsencrypt/live/ashishbisoi.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashishbisoi.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Reverse proxy to the portfolio container
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
